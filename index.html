<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pokémon Battles Online</title>

<style>
body {
    margin:0;
    font-family:system-ui;
    background:radial-gradient(circle at top,#1d4ed8 0,#020617 50%,#000 100%);
    color:white;
    display:flex;
    justify-content:center;
}
.app { width:100%; max-width:900px; padding:16px; }

.card {
    background:rgba(15,23,42,0.9);
    border:1px solid rgba(148,163,184,0.3);
    border-radius:14px;
    padding:14px;
    margin-bottom:14px;
}

input, button {
    width:100%;
    padding:10px;
    border-radius:12px;
    border:none;
    margin-top:8px;
}

input {
    background:#0b1120;
    color:white;
    border:1px solid rgba(148,163,184,0.4);
}

button {
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:black;
    font-weight:600;
}

.poke-box {
    display:none;
    margin-top:10px;
    display:flex;
    gap:10px;
}

.poke-box img {
    width:70px;
    height:70px;
    border-radius:12px;
}

.result {
    background:rgba(15,23,42,0.9);
    border:1px solid rgba(148,163,184,0.3);
    border-radius:14px;
    padding:14px;
    margin-top:14px;
    white-space:pre-line;
}
</style>
</head>
<body>
<div class="app">

<h1>Pokémon Battles Online</h1>
<p>Mode codis · Rival ocult fins al combat</p>

<!-- ============================
     ZONA LOCAL (Jugador 1)
============================ -->
<div class="card">
    <h2>Jugador LOCAL</h2>
    <input id="localInput" placeholder="Nom o codi del teu Pokémon">
    <button onclick="loadLocal()">Carrega Pokémon Local</button>

    <div id="localBox" class="poke-box">
        <img id="localImg">
        <div id="localInfo"></div>
    </div>
</div>

<!-- ============================
     ZONA CODIS (generar)
============================ -->
<div class="card">
    <h2>Generar codi del teu Pokémon</h2>
    <input id="codeInput" placeholder="Nom o URL del teu Pokémon">
    <button onclick="generateCode()">Genera codi</button>
    <input id="generatedCode" readonly placeholder="Codi generat">
</div>

<!-- ============================
     ZONA RIVAL (codi rebut)
============================ -->
<div class="card">
    <h2>Codi del Rival</h2>
    <input id="rivalCode" placeholder="Codi rebut del rival">
    <button onclick="loadRivalCode()">Carrega codi del rival</button>
    <div id="rivalMsg" style="margin-top:6px;color:#38bdf8;"></div>
</div>

<button onclick="startBattle()">COMENÇA EL COMBAT</button>

<div id="result" class="result"></div>

</div>
<script>
let localPokemon = null;
let rivalID = null;

// ============================
// Carregar Pokémon per nom
// ============================
async function fetchPokemon(name){
    name = name.trim().toLowerCase();
    const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
    if(!r.ok) throw "Pokémon no trobat";
    const d = await r.json();
    return {
        id: d.id,
        name: d.name,
        types: d.types.map(t=>t.type.name),
        sprite: d.sprites.other["official-artwork"].front_default
    };
}

// ============================
// Detectar si és codi o nom
// ============================
function isCode(str){
    return /^\d{4}-\d{4}$/.test(str.trim());
}

// ============================
// Carregar Pokémon LOCAL
// ============================
async function loadLocal(){
    const input = localInput.value.trim();

    if(isCode(input)){
        alert("Aquest espai és per al teu Pokémon, no per al codi del rival.");
        return;
    }

    try{
        localPokemon = await fetchPokemon(input);
        localImg.src = localPokemon.sprite;
        localInfo.innerHTML = `<b>${localPokemon.name}</b><br>${localPokemon.types.join(", ")}`;
        localBox.style.display = "flex";
    }catch(e){
        alert(e);
    }
}

// ============================
// Obtenir ID d'un nom o URL
// ============================
async function getID(input){
    input = input.trim().toLowerCase();

    if(/^\d+$/.test(input)) return parseInt(input);

    if(input.includes("pokeapi")){
        let p = input.split("/");
        let last = p.pop() || p.pop();
        if(/^\d+$/.test(last)) return parseInt(last);
        input = last;
    }

    return (await fetchPokemon(input)).id;
}

// ============================
// Generar codi
// ============================
async function generateCode(){
    try{
        const id = await getID(codeInput.value);
        const key = Math.floor(Math.random()*10000);
        const enc = id ^ key;
        generatedCode.value = 
            enc.toString().padStart(4,"0") + "-" +
            key.toString().padStart(4,"0");
    }catch(e){
        alert("Error generant codi");
    }
}

// ============================
// Carregar codi del rival
// ============================
function loadRivalCode(){
    const code = rivalCode.value.trim();
    if(!isCode(code)){
        alert("Format incorrecte");
        return;
    }

    const [a,b] = code.split("-");
    rivalID = parseInt(a) ^ parseInt(b);

    rivalMsg.textContent = "Codi del rival carregat";
}

// ============================
// Taula de tipus
// ============================
const CHART = {
  normal:{rock:.5,ghost:0,steel:.5},
  fire:{fire:.5,water:.5,grass:2,ice:2,bug:2,rock:.5,dragon:.5,steel:2},
  water:{fire:2,water:.5,grass:.5,ground:2,rock:2,dragon:.5},
  electric:{water:2,electric:.5,grass:.5,ground:0,flying:2,dragon:.5},
  grass:{fire:.5,water:2,grass:.5,poison:.5,ground:2,flying:.5,bug:.5,rock:2,dragon:.5,steel:.5},
  ice:{fire:.5,water:.5,grass:2,ground:2,flying:2,dragon:2,steel:.5},
  fighting:{normal:2,ice:2,rock:2,dark:2,steel:2,poison:.5,flying:.5,psychic:.5,bug:.5,fairy:.5,ghost:0},
  poison:{grass:2,fairy:2,poison:.5,ground:.5,rock:.5,ghost:.5,steel:0},
  ground:{fire:2,electric:2,poison:2,rock:2,steel:2,grass:.5,bug:.5,flying:0},
  flying:{grass:2,fighting:2,bug:2,electric:.5,rock:.5,steel:.5},
  psychic:{fighting:2,poison:2,psychic:.5,steel:.5,dark:0},
  bug:{grass:2,psychic:2,dark:2,fire:.5,fighting:.5,poison:.5,flying:.5,ghost:.5,steel:.5,fairy:.5},
  rock:{fire:2,ice:2,flying:2,bug:2,fighting:.5,ground:.5,steel:.5},
  ghost:{psychic:2,ghost:2,dark:.5,normal:0},
  dragon:{dragon:2,steel:.5,fairy:0},
  dark:{psychic:2,ghost:2,fighting:.5,dark:.5,fairy:.5},
  steel:{ice:2,rock:2,fairy:2,fire:.5,water:.5,electric:.5,steel:.5},
  fairy:{fighting:2,dragon:2,dark:2,fire:.5,poison:.5,steel:.5}
};

function eff(att,def){
    let total=1;
    for(const a of att)
        for(const d of def)
            total*=CHART[a]?.[d] ?? 1;
    return total;
}

// ============================
// COMBAT FINAL
// ============================
async function startBattle(){
    if(!localPokemon){ alert("Carrega el teu Pokémon"); return; }
    if(!rivalID){ alert("Carrega el codi del rival"); return; }

    const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${rivalID}`);
    const d = await r.json();
    const rival = {
        name:d.name,
        types:d.types.map(t=>t.type.name)
    };

    const e1 = eff(localPokemon.types, rival.types);
    const e2 = eff(rival.types, localPokemon.types);

    let out = `🔵 ${localPokemon.name} vs 🔴 ${rival.name}\n\n`;
    out += `Efectivitat ${localPokemon.name} → ${rival.name}: x${e1}\n`;
    out += `Efectivitat ${rival.name} → ${localPokemon.name}: x${e2}\n\n`;

    if(e1 > e2) out += "🏆 Guanya el Jugador LOCAL";
    else if(e2 > e1) out += "🏆 Guanya el Rival";
    else out += "🤝 Empat";

    result.textContent = out;
}
</script>
</html>
