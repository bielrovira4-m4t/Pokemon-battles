<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pokémon Battles Online</title>
<style>
:root {
    --bg1:#020617; --bg2:#0f172a; --accent:#38bdf8;
    --text:#e5e7eb; --soft:#94a3b8; --card:#0f172a;
    --r:14px;
}
body {
    margin:0; font-family:system-ui;
    background:radial-gradient(circle at top,#1d4ed8 0,#020617 50%,#000 100%);
    color:var(--text); display:flex; justify-content:center;
}
.app { width:100%; max-width:900px; padding:16px; }
h1 { text-align:center; margin:6px 0 2px; font-size:1.8rem; }
p { text-align:center; color:var(--soft); margin:0 0 12px; }

.card {
    background:rgba(15,23,42,0.9);
    border:1px solid rgba(148,163,184,0.3);
    border-radius:var(--r); padding:14px; margin-bottom:14px;
}
.card h2 { margin:0 0 6px; font-size:1.1rem; }
input {
    width:100%; padding:10px; border-radius:var(--r);
    border:1px solid rgba(148,163,184,0.4);
    background:#0b1120; color:var(--text);
}
button {
    width:100%; padding:10px; margin-top:8px;
    border:none; border-radius:var(--r);
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:#000; font-weight:600; cursor:pointer;
}
button:active { transform:scale(.98); }

.poke-box { display:none; margin-top:10px; display:flex; gap:10px; }
.poke-box img { width:70px; height:70px; border-radius:var(--r); }

.result {
    background:rgba(15,23,42,0.9);
    border:1px solid rgba(148,163,184,0.3);
    border-radius:var(--r); padding:14px; margin-top:14px;
    white-space:pre-line; font-size:.9rem;
}

@media(max-width:480px){
    h1{font-size:1.5rem;}
    button{font-size:.9rem;}
}
</style>
<body>
<div class="app">

<h1>Pokémon Battles Online</h1>
<p>Mode codis · Rival ocult fins al combat</p>

<div class="card">
    <h2>Jugador 1 (Tu)</h2>
    <input id="p1name" placeholder="Nom del Pokémon (ex: ditto)">
    <button onclick="loadP1()">Carrega Pokémon 1</button>

    <div id="p1box" class="poke-box">
        <img id="p1img">
        <div id="p1info"></div>
    </div>

    <h3>Generar codi</h3>
    <input id="p1codeinput" placeholder="Nom o URL">
    <button onclick="genCode(1)">Genera codi</button>
    <input id="p1code" readonly placeholder="Codi generat">
</div>

<div class="card">
    <h2>Jugador 2 (Rival)</h2>
    <input id="p2name" placeholder="Nom del Pokémon">
    <button onclick="loadP2()">Carrega Pokémon 2</button>

    <div id="p2box" class="poke-box">
        <img id="p2img">
        <div id="p2info"></div>
    </div>

    <h3>Introdueix codi del rival</h3>
    <input id="rivalcode" placeholder="Codi rebut">
    <button onclick="loadRivalCode()">Carrega codi del rival</button>
    <div id="rivalmsg" style="color:#38bdf8;margin-top:6px;"></div>
</div>

<button onclick="startBattle()">COMENÇA EL COMBAT</button>

<div id="result" class="result"></div>

</div>
</body>
<script>
let P1=null, P2=null, rivalID=null;

// =======================
// Carregar Pokémon
// =======================
async function fetchPokemon(name){
    name=name.trim().toLowerCase();
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
    if(!r.ok) throw "Pokémon no trobat";
    const d=await r.json();
    return {
        id:d.id,
        name:d.name,
        types:d.types.map(t=>t.type.name),
        abilities:d.abilities.map(a=>a.ability.name),
        sprite:d.sprites.other["official-artwork"].front_default
    };
}

async function loadP1(){
    try{
        P1=await fetchPokemon(p1name.value);
        p1img.src=P1.sprite;
        p1info.innerHTML=`<b>${P1.name}</b><br>${P1.types.join(", ")}`;
        p1box.style.display="flex";
    }catch(e){alert(e);}
}

async function loadP2(){
    try{
        P2=await fetchPokemon(p2name.value);
        p2img.src=P2.sprite;
        p2info.innerHTML=`<b>${P2.name}</b><br>${P2.types.join(", ")}`;
        p2box.style.display="flex";
    }catch(e){alert(e);}
}

// =======================
// Sistema de codis XOR
// =======================
async function getID(input){
    input=input.trim().toLowerCase();
    if(/^\d+$/.test(input)) return parseInt(input);
    if(input.includes("pokeapi")){
        let p=input.split("/");
        let last=p.pop()||p.pop();
        if(/^\d+$/.test(last)) return parseInt(last);
        input=last;
    }
    return (await fetchPokemon(input)).id;
}

async function genCode(player){
    try{
        const id=await getID(player===1?p1codeinput.value:p2codeinput.value);
        const key=Math.floor(Math.random()*10000);
        const enc=id^key;
        const code=enc.toString().padStart(4,"0")+"-"+key.toString().padStart(4,"0");
        if(player===1) p1code.value=code;
        else p2code.value=code;
    }catch(e){alert("Error generant codi");}
}

async function loadRivalCode(){
    const code=rivalcode.value.trim();
    if(!/^\d{4}-\d{4}$/.test(code)){alert("Format incorrecte");return;}
    const [a,b]=code.split("-");
    rivalID=parseInt(a)^parseInt(b);
    rivalmsg.textContent="Codi del rival carregat";
}

// =======================
// Combat
// =======================
const CHART={
  normal:{rock:.5,ghost:0,steel:.5},
  fire:{fire:.5,water:.5,grass:2,ice:2,bug:2,rock:.5,dragon:.5,steel:2},
  water:{fire:2,water:.5,grass:.5,ground:2,rock:2,dragon:.5},
  electric:{water:2,electric:.5,grass:.5,ground:0,flying:2,dragon:.5},
  grass:{fire:.5,water:2,grass:.5,poison:.5,ground:2,flying:.5,bug:.5,rock:2,dragon:.5,steel:.5},
  ice:{fire:.5,water:.5,grass:2,ground:2,flying:2,dragon:2,steel:.5},
  fighting:{normal:2,ice:2,rock:2,dark:2,steel:2,poison:.5,flying:.5,psychic:.5,bug:.5,fairy:.5,ghost:0},
  poison:{grass:2,fairy:2,poison:.5,ground:.5,rock:.5,ghost:.5,steel:0},
  ground:{fire:2,electric:2,poison:2,rock:2,steel:2,grass:.5,bug:.5,flying:0},
  flying:{grass:2,fighting:2,bug:2,electric:.5,rock:.5,steel:.5},
  psychic:{fighting:2,poison:2,psychic:.5,steel:.5,dark:0},
  bug:{grass:2,psychic:2,dark:2,fire:.5,fighting:.5,poison:.5,flying:.5,ghost:.5,steel:.5,fairy:.5},
  rock:{fire:2,ice:2,flying:2,bug:2,fighting:.5,ground:.5,steel:.5},
  ghost:{psychic:2,ghost:2,dark:.5,normal:0},
  dragon:{dragon:2,steel:.5,fairy:0},
  dark:{psychic:2,ghost:2,fighting:.5,dark:.5,fairy:.5},
  steel:{ice:2,rock:2,fairy:2,fire:.5,water:.5,electric:.5,steel:.5},
  fairy:{fighting:2,dragon:2,dark:2,fire:.5,poison:.5,steel:.5}
};

function eff(att,def){
    let total=1;
    for(const a of att)
        for(const d of def)
            total*=CHART[a]?.[d]??1;
    return total;
}

async function startBattle(){
    if(!P1){alert("Carrega el teu Pokémon");return;}
    if(!P2){alert("Carrega el teu Pokémon");return;}
    if(!rivalID){alert("Introdueix el codi del rival");return;}

    // Desencriptar rival
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${rivalID}`);
    const d=await r.json();
    const Rival={
        name:d.name,
        types:d.types.map(t=>t.type.name),
        abilities:d.abilities.map(a=>a.ability.name)
    };

    const e1=eff(P1.types,Rival.types);
    const e2=eff(Rival.types,P2.types);

    let out=`🔵 ${P1.name} vs 🔴 ${Rival.name}\n\n`;
    out+=`Efectivitat ${P1.name} → ${Rival.name}: x${e1}\n`;
    out+=`Efectivitat ${Rival.name} → ${P2.name}: x${e2}\n\n`;

    if(e1>e2) out+="🏆 Guanya Jugador 1";
    else if(e2>e1) out+="🏆 Guanya Jugador 2";
    else out+="🤝 Empat";

    result.textContent=out;
}
</script>

</body>
</html>
